<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colors - BDeLa23</title>
    <style>
        button {
            cursor: pointer;
        }

        .container {
            border: 1.5px solid #ccc;
            border-radius: 4px;
            width: fit-content;
            padding: 1rem;
        }

        i {
            cursor: pointer;
        }
    </style>
    <script>
        function createColor() {
            const divContenidor = document.createElement('div')
            divContenidor.style.marginTop = '1rem'
            divContenidor.className = 'container'
            
            const color = document.createElement('input')
            color.type = 'color'

            const trash = document.createElement('i')
            trash.className = 'fa-solid fa-trash'
            trash.style.marginLeft = '0.5rem'
            trash.onclick = function() {
                divContenidor.remove()
            }

            
            divContenidor.appendChild(color)
            divContenidor.appendChild(trash)
            document.getElementById('llistaColors').appendChild(divContenidor)
        }

        function deleteAll() {
            const div = document.getElementById('llistaColors')

            div.innerHTML = ''
        }
    </script>
    <script src="https://kit.fontawesome.com/70ea528883.js" crossorigin="anonymous"></script>
</head>
<body>
    <button onclick="createColor()">Create Color</button>
    <button onclick="deleteAll()">Delete all colors</button>
    <a href="https://github.com/BDeLa23/colors" target="_blank"><button style="float: right;">Project on Github</button></a>

    <div id="llistaColors">

    </div>
</body>

</html>
